{% extends 'base.html' %}

{% block title %}Payment Failed - TravelEase{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-x-circle display-1 text-danger"></i>
            <h3 class="fw-bold mt-3">Payment Failed (Simulation)</h3>
            <p class="text-muted">The transaction could not be completed.</p>
            <p class="small">Booking: <strong>{{ booking.booking_reference }}</strong> | NPR {{ booking.total_price }}</p>
            <form method="POST" class="mt-3">
                {% csrf_token %}
                <input type="hidden" name="payment_method" value="KHALTI">
                <button type="submit" class="btn btn-danger">Record Failed Payment</button>
            </form>
            <a href="{% url 'payment:make_payment' booking.id %}" class="btn btn-outline-primary mt-3">
                <i class="bi bi-arrow-repeat me-1"></i> Try Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
