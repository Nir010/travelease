{% extends 'base.html' %}

{% block title %}Verify Email OTP - TravelEase{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-check display-4 text-success"></i>
                        <h3 class="fw-bold mt-2">Email Verification</h3>
                        <p class="text-muted">
                            We've sent a 6-digit OTP to<br>
                            <strong>{{ email }}</strong>
                        </p>
                    </div>

                    <form method="POST" action="{% url 'accounts:verify_otp' %}">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Enter OTP</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="text" name="otp" class="form-control text-center fs-4"
                                       placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                                       required autofocus style="letter-spacing: 8px;">
                            </div>
                            <small class="text-muted">Enter the 6-digit code from your email.</small>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm mb-3">
                            <i class="bi bi-check-circle me-2"></i> Verify OTP
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="text-muted mb-2">Didn't receive the code?</p>
                        <a href="{% url 'accounts:resend_otp' %}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-arrow-repeat me-1"></i> Resend OTP
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
