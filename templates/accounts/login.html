{% extends 'base.html' %}

{% block title %}Login - TravelEase{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-arrow-in-right display-4 text-primary"></i>
                        <h3 class="fw-bold mt-2">Welcome Back!</h3>
                        <p class="text-muted">Login to your TravelEase account</p>
                    </div>

                    <form method="POST" action="{% url 'accounts:login' %}">
                        {% csrf_token %}

                        {% if request.GET.next %}
                        <input type="hidden" name="next" value="{{ request.GET.next }}">
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control"
                                       placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control"
                                       placeholder="Enter your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Login
                        </button>

                        <p class="text-center text-muted mb-0">
                            Don't have an account?
                            <a href="{% url 'accounts:register' %}" class="fw-semibold">Register here</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
